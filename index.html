<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Profiles in Ireland</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js" defer></script>
  <script src="./app.js" defer></script>
</head>
<body>
  <main>
    <h1>GitHub Profiles in Ireland</h1>
    <p>
      Public GitHub data for accounts listing a location in Ireland or Northern Ireland.
      Sort any column; use the filters to narrow the table.
    </p>
    <p id="dataset-note" class="muted">Loading snapshot...</p>

    <form id="filters" aria-label="Filters" onsubmit="return false">
      <p>
        <label for="filter-search">Search</label>
        <input id="filter-search" type="text" placeholder="login, bio, university, repo">
      </p>
      <p>
        <label for="filter-stage">Career stage</label>
        <select id="filter-stage">
          <option value="">All</option>
          <option value="likely_student">Student</option>
          <option value="likely_early_career">Early-career</option>
          <option value="academic_research">Academic research</option>
          <option value="industry_experienced">Industry experienced</option>
          <option value="unknown">Unknown</option>
        </select>
      </p>
      <p>
        <label for="filter-jurisdiction">Jurisdiction</label>
        <select id="filter-jurisdiction">
          <option value="">All</option>
          <option value="Republic of Ireland">Republic of Ireland</option>
          <option value="Northern Ireland">Northern Ireland</option>
          <option value="Uncertain">Uncertain</option>
        </select>
      </p>
      <p>
        <label for="filter-stars">Min stars</label>
        <input id="filter-stars" type="number" min="0" value="0">
      </p>
      <p>
        <label for="filter-momentum">Min momentum</label>
        <input id="filter-momentum" type="number" min="0" value="0">
      </p>
      <p>
        <label for="filter-ireland-confidence">Min Ireland confidence</label>
        <select id="filter-ireland-confidence">
          <option value="0">Any</option>
          <option value="0.5">50%+</option>
          <option value="0.8">80%+</option>
          <option value="0.9">90%+</option>
        </select>
      </p>
      <p>
        <label for="filter-university">
          <input id="filter-university" type="checkbox">
          University signal only
        </label>
      </p>
      <p>
        <label for="page-size">Page size</label>
        <select id="page-size">
          <option value="20">20</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
        </select>
      </p>
      <p>
        <button id="apply-filters" type="button">Apply</button>
        <button id="reset-filters" type="button">Reset</button>
      </p>
      <p id="row-count" class="muted" aria-live="polite"></p>
    </form>

    <table id="users-table">
      <thead>
        <tr>
          <th><button data-sort="login" aria-sort="none">Profile <span class="sort-indicator"></span></button></th>
          <th><button data-sort="irish_confidence" aria-sort="none">Location <span class="sort-indicator"></span></button></th>
          <th><button data-sort="career_stage_bucket" aria-sort="none">Career stage <span class="sort-indicator"></span></button></th>
          <th><button data-sort="university_name" aria-sort="none">University <span class="sort-indicator"></span></button></th>
          <th><button data-sort="followers" aria-sort="none">Followers <span class="sort-indicator"></span></button></th>
          <th><button data-sort="total_stars" aria-sort="descending">Total stars <span class="sort-indicator"></span></button></th>
          <th><button data-sort="top_repo_stars" aria-sort="none">Top repo <span class="sort-indicator"></span></button></th>
          <th><button data-sort="total_contributions_last_12_months" aria-sort="none">Activity (12m) <span class="sort-indicator"></span></button></th>
          <th><button data-sort="stars_delta_30d" aria-sort="none">30d delta <span class="sort-indicator"></span></button></th>
          <th><button data-sort="momentum_score" aria-sort="none">Momentum <span class="sort-indicator"></span></button></th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>

    <p class="pagination">
      <button id="prev-page" type="button">Previous</button>
      <span id="page-info" aria-live="polite"></span>
      <button id="next-page" type="button">Next</button>
    </p>
  </main>
</body>
</html>
